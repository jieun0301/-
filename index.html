<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Private Reel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; font-family: sans-serif; }
        .video-container { height: 100dvh; scroll-snap-type: y mandatory; overflow-y: scroll; scrollbar-width: none; -ms-overflow-style: none; }
        .video-container::-webkit-scrollbar { display: none; }
        .video-section { height: 100dvh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: black; }
        video { max-height: 100%; max-width: 100%; object-fit: contain; background: black; }
    </style>
</head>
<body>

    <div class="video-container" id="feed">
        <div class="text-white flex items-center justify-center h-full">로딩 중...</div>
    </div>

    <div class="fixed bottom-5 right-5 z-50 flex flex-col gap-3">
        <button onclick="checkAdmin()" class="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center text-white backdrop-blur-md opacity-30 hover:opacity-100">🔒</button>
    </div>

    <div id="uploadModal" class="fixed inset-0 bg-black/90 hidden flex-col items-center justify-center text-white p-5 z-[100]">
        <h2 class="mb-5 text-xl font-bold">영상 관리</h2>
        <input type="file" id="videoInput" accept="video/*" class="mb-5 border p-2 w-full max-w-xs bg-transparent">
        <div class="flex gap-4">
            <button onclick="uploadVideo()" id="uploadBtn" class="bg-blue-600 px-6 py-2 rounded font-bold">업로드 시작</button>
            <button onclick="closeModal()" class="bg-gray-600 px-6 py-2 rounded">닫기</button>
        </div>
        <div id="status" class="mt-4 text-sm text-blue-400 font-bold"></div>
    </div>

    <script>
        const S_URL = 'https://emizkuoleiqbkobvmbvu.supabase.co'; 
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVtaXprdW9sZWlxYmtvYnZtYnZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMzI3OTgsImV4cCI6MjA5MDYwODc5OH0.FKqJ-i72dxKV8LB1dy6WZDJgJmScMYMU1awF5yFhCNU';
        const s_client = supabase.createClient(S_URL, S_KEY);

        let isAdmin = false;

        // 1. 영상 목록 불러오기 (최신순 정렬)
        async function loadVideos() {
            const feed = document.getElementById('feed');
            const { data, error } = await s_client.storage.from('videos').list('', {
                sortBy: { column: 'created_at', order: 'desc' }
            });
            
            if (error) {
                feed.innerHTML = '<div class="text-white p-10">연결 오류</div>';
                return;
            }

            feed.innerHTML = '';
            data.forEach(file => {
                if (file.name === '.emptyFolderPlaceholder') return;
                const { data: { publicUrl } } = s_client.storage.from('videos').getPublicUrl(file.name);
                addVideoToFeed(publicUrl, file.name);
            });
            setupObserver();
        }

        // 2. 피드에 영상 추가
        function addVideoToFeed(url, fileName) {
            const feed = document.getElementById('feed');
            const section = document.createElement('div');
            section.className = 'video-section';
            section.innerHTML = `
                <video src="${url}" 
                       loop 
                       muted 
                       playsinline 
                       preload="none" 
                       class="cursor-pointer"
                       onclick="togglePlay(this)">
                </video>
                <button onclick="toggleMute(this)" class="absolute bottom-24 right-5 bg-black/40 text-white p-3 rounded-full z-50 text-xl">🔇</button>
                ${isAdmin ? `<button onclick="deleteVideo('${fileName}')" class="absolute top-5 right-5 bg-red-600 text-white px-4 py-2 rounded-full text-xs z-50">삭제</button>` : ''}
            `;
            feed.appendChild(section);
        }

        // 3. 재생/일시정지 및 소리 제어
        function togglePlay(v) { v.paused ? v.play() : v.pause(); }
        function toggleMute(btn) {
            const video = btn.parentElement.querySelector('video');
            video.muted = !video.muted;
            btn.innerText = video.muted ? '🔇' : '🔊';
        }

        // 4. [핵심] 무조건 처음부터 재생 로직 (Intersection Observer)
        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (video) {
                        if (entry.isIntersecting) {
                            // 화면에 들어오면 시간을 0으로 돌리고 재생
                            video.currentTime = 0; 
                            video.play().catch(() => {});
                        } else {
                            // 화면에서 나가면 일시정지 (리소스 절약)
                            video.pause();
                        }
                    }
                });
            }, { threshold: 0.6 }); // 60% 이상 보일 때 작동

            document.querySelectorAll('.video-section').forEach(s => observer.observe(s));
        }

        // 5. 업로드 (파일이름 안전하게 변경)
        async function uploadVideo() {
            const fileInput = document.getElementById('videoInput');
            const file = fileInput.files[0];
            if (!file) return alert("파일 선택!");

            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');
            btn.disabled = true;
            status.innerText = "업로드 중... 창을 닫지 마세요.";

            const ext = file.name.split('.').pop();
            const safeName = `v_${Date.now()}.${ext}`;

            const { data, error } = await s_client.storage.from('videos').upload(safeName, file);

            if (error) {
                alert("실패: " + error.message);
                btn.disabled = false;
            } else {
                alert("성공!");
                location.reload();
            }
        }

        async function deleteVideo(name) {
            if (confirm("삭제할까요?")) {
                await s_client.storage.from('videos').remove([name]);
                location.reload();
            }
        }

        function checkAdmin() {
            if (prompt("비밀번호 입력") === "0000") {
                isAdmin = true;
                document.getElementById('uploadModal').style.display = 'flex';
                loadVideos();
            }
        }
        function closeModal() { document.getElementById('uploadModal').style.display = 'none'; }

        loadVideos();
    </script>
</body>
</html>
