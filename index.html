<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Private TikTok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 틱톡 바이브의 핵심: 딱딱 끊기는 스크롤 */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; }
        .video-container {
            height: 100dvh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none; /* 파이어폭스 스크롤바 숨김 */
        }
        .video-container::-webkit-scrollbar { display: none; } /* 크롬 스크롤바 숨김 */
        .video-section {
            height: 100dvh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 영상 안 잘리게 하는 마법의 설정 */
        video {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain; /* 이 설정이 영상을 절대 안 잘리게 합니다 */
        }
    </style>
</head>
<body>

    <div class="video-container" id="feed">
        <div class="video-section">
            <video src="https://assets.mixkit.co/videos/preview/mixkit-girl-in-neon-light-1282-large.mp4" loop muted playsinline onclick="togglePlay(this)"></video>
            <div class="absolute bottom-10 left-5 text-white">
                <p class="font-bold">@MyVibe</p>
                <p class="text-sm text-gray-300">첫 번째 영상입니다! 🔥</p>
            </div>
        </div>
    </div>

    <button onclick="checkAdmin()" class="fixed bottom-5 right-5 w-10 h-10 bg-white/10 rounded-full flex items-center justify-center text-white backdrop-blur-md opacity-30 hover:opacity-100 transition-opacity">
        🔒
    </button>

    <div id="uploadModal" class="fixed inset-0 bg-black/80 hidden flex-col items-center justify-center text-white p-5">
        <h2 class="mb-5 text-xl font-bold">비밀 업로드</h2>
        <input type="file" id="videoInput" accept="video/*" class="mb-5 border p-2 w-full max-w-xs">
        <div class="flex gap-4">
            <button onclick="uploadVideo()" class="bg-blue-600 px-6 py-2 rounded">올리기</button>
            <button onclick="closeModal()" class="bg-gray-600 px-6 py-2 rounded">닫기</button>
        </div>
    </div>

    <script>
        // 1. 재생/일시정지 컨트롤
        function togglePlay(v) {
            v.paused ? v.play() : v.pause();
        }

        // 2. 비밀번호 확인
        function checkAdmin() {
            const pw = prompt("비밀번호를 입력하세요.");
            if (pw === "0000") { // 비밀번호 설정
                document.getElementById('uploadModal').style.display = 'flex';
            } else {
                alert("틀렸습니다.");
            }
        }

        function closeModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }

        // 3. 실제 업로드 로직 (여기에 Supabase나 Firebase를 연결하면 완성!)
        function uploadVideo() {
            const file = document.getElementById('videoInput').files[0];
            if (!file) return alert("영상을 선택하세요.");
            
            alert(file.name + " 파일 업로드 로직을 시작합니다. (DB 연결 필요)");
            closeModal();
        }

        // 4. 스크롤 시 자동 재생 로직
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                if (entry.isIntersecting) v.play();
                else v.pause();
            });
        }, { threshold: 0.7 });

        document.querySelectorAll('.video-section').forEach(section => observer.observe(section));
    </script>
</body>
</html>
